<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С прошедшим! подружаня :D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SN Pro Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SN+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FDF8F3',
                        beige: '#F5EDE4',
                        warm: '#E8DDD0',
                        accent: '#C9A87C',
                        text: '#4A4035',
                        muted: '#8B7E6A',
                    },
                    fontFamily: {
                        'sn': ['"SN Pro"', 'Source Sans 3', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SN Pro', sans-serif;
            background: #FDF8F3;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Aurora Background */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            animation: aurora-drift 20s ease-in-out infinite alternate;
        }
        
        .aurora-blob:nth-child(1) {
            width: 60vw;
            height: 50vh;
            background: radial-gradient(circle, #E8D4C4 0%, transparent 70%);
            top: -15%;
            left: -5%;
            animation-duration: 18s;
        }
        
        .aurora-blob:nth-child(2) {
            width: 45vw;
            height: 55vh;
            background: radial-gradient(circle, #D4C4B0 0%, transparent 70%);
            top: 25%;
            right: -10%;
            animation-duration: 22s;
            animation-delay: -7s;
        }
        
        .aurora-blob:nth-child(3) {
            width: 50vw;
            height: 45vh;
            background: radial-gradient(circle, #C9B8A0 0%, transparent 70%);
            bottom: -5%;
            left: 25%;
            animation-duration: 25s;
            animation-delay: -4s;
        }
        
        @keyframes aurora-drift {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5vw, -3vh) scale(1.05); }
            66% { transform: translate(-3vw, 4vh) scale(0.95); }
            100% { transform: translate(2vw, 2vh) scale(1.03); }
        }
        
        /* Noise Overlay */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }
        
        /* Main Content */
        .main-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }

        /* Glass Card Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        
        /* Typing Cursor */
        .typing-cursor {
            display: inline-block;
            font-weight: 500;
            color: #C9A87C;
            animation: smoothBlink 1s ease-in-out infinite;
        }
        
        .typing-cursor::after {
            content: '_';
        }
        
        @keyframes smoothBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* Typing Container (Textarea simulation) */
        .typing-container {
            text-align: left;
            min-height: 1.5em;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        /* Media Container 5:4 Horizontal Ratio */
        .media-container {
            position: relative;
            width: 100%;
            padding-bottom: 80%; /* 4:5 Aspect Ratio (Horizontal) -> 4/5 = 0.8 */
            background: #eee;
            border-radius: 16px;
            overflow: hidden;
        }
        
        .media-container img,
        .media-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Answer Buttons */
        .answer-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(4px);
        }
        
        .answer-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(201, 168, 124, 0.15) 50%, transparent 60%);
            background-size: 200% 100%;
            background-position: -100% 0;
            transition: background-position 0.6s ease;
        }
        
        .answer-btn:hover::before {
            background-position: 200% 0;
        }
        
        .answer-btn.selected {
            border-color: #C9A87C;
            background: rgba(201, 168, 124, 0.15);
            transform: scale(1.02);
        }
        
        .answer-btn.confirmed {
            pointer-events: none;
        }
        
        .answer-btn.correct {
            border-color: #7CB08A;
            background: rgba(124, 176, 138, 0.2);
            animation: correct-pulse 0.5s ease;
        }
        
        .answer-btn.incorrect {
            border-color: #C98787;
            background: rgba(201, 135, 135, 0.2);
            animation: incorrect-shake 0.4s ease;
        }
        
        @keyframes correct-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        
        @keyframes incorrect-shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        
        /* Toggle Switch */
        .toggle-container {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .toggle-switch {
            width: 52px;
            height: 28px;
            background: #E8DDD0;
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s ease;
            border: 1px solid rgba(201, 168, 124, 0.3);
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: #C9A87C;
            border-radius: 50%;
            top: 2px;
            left: 3px;
            transition: transform 0.3s ease;
        }
        
        .toggle-switch.active {
            background: rgba(201, 168, 124, 0.3);
        }
        
        .toggle-switch.active::after {
            transform: translateX(23px);
        }
        
        /* Hidden Image - No background/shadow */
        .hidden-image {
            position: fixed;
            left: 70%;
            bottom: -95%; /* Hidden by default */
            transform: translateX(-50%);
            z-index: 90;
            max-width: 600px;
            width: 90%;
            height: auto;
            object-fit: contain;
            transition: bottom 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            /* Removed border-radius and box-shadow for transparent PNG */
        }
        
        .hidden-image.visible {
            bottom: 5%; /* Visible position */
        }
        
        /* Progress Bar */
        .progress-bar {
            height: 4px;
            background: #E8DDD0;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #C9A87C, #D4B896);
            transition: width 0.5s ease;
        }
        
        /* Fade animations */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }
        
        .fade-out {
            animation: fadeOut 0.4s ease forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }
        
        /* Stagger animations */
        .stagger-item {
            opacity: 0;
            transform: translateY(20px);
        }
        
        .stagger-item.animate {
            animation: staggerIn 0.5s ease forwards;
        }
        
        @keyframes staggerIn {
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -20px;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        
        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Aurora Background -->
    <div class="aurora" aria-hidden="true">
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
    </div>
    <div class="noise" aria-hidden="true"></div>
    
    <!-- Main Content -->
    <div class="main-content">
        
        <!-- Welcome Template -->
        <template id="template-welcome">
            <div class="min-h-screen flex flex-col items-center justify-center px-6 py-12">
                <div class="max-w-2xl w-full">
                    <!-- Invisible textarea simulation -->
                    <div class="typing-container text-2xl md:text-3xl font-semibold text-text leading-relaxed">
                        <span id="typing-text"></span><span class="typing-cursor"></span>
                    </div>
                    
                    <div class="mt-12 flex justify-start">
                        <button id="start-btn" class="px-8 py-3 bg-accent/10 border border-accent/30 rounded-2xl text-text font-medium hover:bg-accent/20 hover:border-accent/50 transition-all duration-300 opacity-0 pointer-events-none">
                            Начать викторину
                        </button>
                    </div>
                </div>
            </div>
        </template>
        
        <!-- Round Template (Generic for all rounds) -->
        <template id="template-round">
            <div class="min-h-screen flex flex-col items-center justify-center px-4 py-8 md:px-8">
                <div class="w-full max-w-5xl glass-card rounded-3xl p-6 md:p-8">
                    <div class="flex flex-col md:flex-row gap-6 md:gap-8">
                        <!-- Media Side -->
                        <div class="w-full md:w-2/5 flex-shrink-0">
                            <div class="media-container bg-beige/30" id="round-media">
                                <!-- Media will be inserted here -->
                            </div>
                        </div>
                        
                        <!-- Content Side -->
                        <div class="flex-grow flex flex-col justify-center">
                            <div class="mb-6">
                                <span class="text-sm text-muted uppercase tracking-wider" id="round-label">Раунд 1 из 4</span>
                                <div class="progress-bar mt-2">
                                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                                </div>
                            </div>
                            
                            <h2 class="text-xl md:text-2xl font-semibold text-text mb-6 leading-tight">
                                <span class="round-question typing-container"></span><span class="typing-cursor"></span>
                            </h2>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="answers-container">
                                <!-- Answers will be inserted here -->
                            </div>
                            
                            <button class="next-round-btn mt-6 px-6 py-2 bg-accent/10 border border-accent/30 rounded-xl text-text font-medium hover:bg-accent/20 transition-all duration-300 opacity-0 pointer-events-none self-start">
                                Далее
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </template>
        
        <!-- Results Template -->
        <template id="template-results">
            <div class="min-h-screen flex flex-col items-center justify-center px-6 py-12">
                <div class="max-w-2xl w-full text-center glass-card rounded-3xl p-8">
                    <div class="mb-8">
                        <span class="text-sm text-muted uppercase tracking-wider">Результаты</span>
                        <div class="progress-bar mt-2">
                            <div class="progress-fill" style="width: 100%"></div>
                        </div>
                    </div>
                    
                    <h2 class="text-3xl md:text-4xl font-semibold text-text mb-4">
                        <span id="results-text" class="typing-container"></span><span class="typing-cursor"></span>
                    </h2>
                    
                    <p id="score-text" class="text-xl text-muted mt-4"></p>
                    
                    <div id="final-message" class="mt-8 text-lg text-text/80 opacity-0 transition-opacity duration-500"></div>
                </div>
            </div>
        </template>
        
    </div>
    
    <!-- Toggle Switch -->
    <div class="toggle-container">
        <span class="text-sm text-muted">Сюрприз</span>
        <div class="toggle-switch" id="surprise-toggle" role="switch" aria-checked="false" tabindex="0"></div>
    </div>
    
    <!-- Hidden Image -->
    <img src="755347937946415.png" alt="Surprise" class="hidden-image" id="surprise-image">
    
    <!-- Audio Elements -->
    <audio id="bg-music" preload="auto" loop>
        <source src="valerij_meladze_krasivo-482.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound-correct" preload="auto">
        <source src="aplodismentyi.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound-incorrect" preload="auto">
        <source src="neudacha.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ==================== DATA ====================
        const TOTAL_ROUNDS = 4;
        
        const quizData = {
            round1: {
                type: 'image',
                src: '1.JPG',
                question: "Эта фотография была сделана в тот момент, когда…",
                answers: [
                    { text: "мы готовились к экзамену", correct: true },
                    { text: "мы придумывали бизнес", correct: false },
                    { text: "мы решили что завтра начнём новую жизнь", correct: false },
                    { text: "мы уже забыли почему собрались", correct: false }
                ]
            },
            round2: {
                type: 'image',
                src: '2.JPG',
                question: "Почему мы вообще пили валокордин?",
                answers: [
                    { text: "успокаивали нервы перед сессией", correct: false },
                    { text: "провожали Настю на важное мероприятие 18+", correct: false },
                    { text: "провожали Лизу на самолет", correct: true },
                    { text: "не хватило денег на вино", correct: false }
                ]
            },
            round3: {
                type: 'video',
                src: '3.MP4',
                question: "Какой трек играет на улице?",
                answers: [
                    { text: "Мой рок-н-ролл", correct: true },
                    { text: "Жить в кайф", correct: false },
                    { text: "Самба белого мотылька", correct: false },
                    { text: "Мы просто сами поем на тихой улице", correct: false }
                ]
            },
            round4: {
                type: 'image',
                src: '4.JPG',
                question: "Чьи это ноги?",
                answers: [
                    { text: "Риты", correct: false },
                    { text: "Ларисы", correct: false },
                    { text: "Алины", correct: true },
                    { text: "не знаю, мы снова оказались у незнакомых людей", correct: false }
                ]
            },
            resultsSequence: [
                { text: "Поздравляю! Ты прошла викторину! ", type: "normal" },
                { text: "Поздравляю! Ты прошла викторину! Хотя честно говоря, вопросы были так себе ", type: "normal" },
                { text: "Поздравляю! Ты прошла викторину! Но главное не это, а то, что ты замечательная подруга! С днём рождения!", type: "final" }
            ]
        };

        // ==================== STATE ====================
        let currentTemplate = null;
        let score = 0;
        let selectedAnswer = null;
        let isConfirmed = false;
        let typingTimeout = null;
        let isSurpriseActive = false;

        // ==================== DOM ELEMENTS ====================
        const bgMusic = document.getElementById('bg-music');
        const soundCorrect = document.getElementById('sound-correct');
        const soundIncorrect = document.getElementById('sound-incorrect');
        const surpriseToggle = document.getElementById('surprise-toggle');
        const surpriseImage = document.getElementById('surprise-image');

        // ==================== PRELOAD ASSETS ====================
        function preloadAssets() {
            const images = ['755347937946415.png', '1.JPG', '2.JPG', '4.JPG'];
            const sounds = ['valerij_meladze_krasivo-482.mp3', 'aplodismentyi.mp3', 'neudacha.mp3'];
            const videos = ['3.MP4'];
            
            images.forEach(src => {
                const img = new Image();
                img.src = src;
            });
            
            sounds.forEach(src => {
                const audio = new Audio();
                audio.src = src;
            });
            
            videos.forEach(src => {
                const video = document.createElement('video');
                video.src = src;
                video.preload = 'auto';
            });
        }

        // ==================== CONFETTI LOGIC ====================
        function triggerConfetti() {
            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);
            
            const colors = ['#C9A87C', '#E8D4C4', '#D4C4B0', '#7CB08A', '#C9B8A0', '#fff'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                
                // Random shapes
                if (Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                }
                
                container.appendChild(confetti);
            }
            
            setTimeout(() => {
                container.remove();
            }, 5000);
        }

        // ==================== TYPING EFFECT ====================
        async function typeText(element, sequence, speed = 50) {
            element.textContent = '';
            
            for (const seq of sequence) {
                const text = seq.text;
                
                for (let i = 0; i <= text.length; i++) {
                    element.textContent = text.substring(0, i);
                    await sleep(speed);
                    
                    if (seq.type === 'final' && i === text.length) {
                        break;
                    }
                    
                    if (seq.type === 'normal' && i === text.length) {
                        await sleep(600);
                        break;
                    }
                }
                
                if (seq.type !== 'final') {
                    await sleep(800);
                    const eraseTo = 0;
                    
                    for (let i = text.length; i >= eraseTo; i--) {
                        element.textContent = text.substring(0, i);
                        await sleep(15);
                    }
                    await sleep(400);
                } else {
                    break;
                }
            }
        }
        
        async function typeSingleText(element, text, speed = 35) {
            element.textContent = '';
            for (let i = 0; i <= text.length; i++) {
                element.textContent = text.substring(0, i);
                await sleep(speed);
            }
        }

        function sleep(ms) {
            return new Promise(resolve => {
                typingTimeout = setTimeout(resolve, ms);
            });
        }

        // ==================== TEMPLATE MANAGEMENT ====================
        function showTemplate(templateId) {
            if (currentTemplate) {
                currentTemplate.classList.remove('active');
                currentTemplate.classList.add('fade-out');
            }
            
            return new Promise(resolve => {
                setTimeout(() => {
                    const template = document.getElementById(templateId);
                    const content = template.content.cloneNode(true);
                    
                    const oldContent = document.querySelector('.template-content');
                    if (oldContent) {
                        oldContent.remove();
                    }
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = 'template-content active';
                    wrapper.appendChild(content);
                    document.querySelector('.main-content').appendChild(wrapper);
                    
                    currentTemplate = wrapper;
                    wrapper.classList.add('fade-in');
                    
                    requestAnimationFrame(() => {
                        resolve(wrapper);
                    });
                }, 400);
            });
        }

        // ==================== WELCOME SCREEN ====================
        async function showWelcome() {
            // Start preloading in background immediately
            preloadAssets();

            const wrapper = await showTemplate('template-welcome');
            
            const typingText = wrapper.querySelector('#typing-text');
            const startBtn = wrapper.querySelector('#start-btn');
            
            if (!typingText) return;
            
            const welcomeSequence = [
                { text: "Hellooooo!", type: "normal" },
                { text: "Представь что сегодня твой день,\nЯ надеюсь ты взяла вкусняшки и чай?", type: "normal" },
                { text: "ВАЖНО…\nПроверь что бы рядом никого не было\nкроме тебя и пельмешки\nИнформация сугубо личного характера", type: "normal" },
            ];
            
            await typeText(typingText, welcomeSequence, 50);
            
            if (startBtn) {
                startBtn.style.opacity = '1';
                startBtn.style.pointerEvents = 'auto';
                startBtn.classList.add('fade-in');
                
                startBtn.addEventListener('click', () => {
                    startBtn.classList.add('fade-out');
                    setTimeout(() => showRound(1), 400);
                });
            }
        }

        // ==================== ROUND LOGIC ====================
        async function showRound(roundNum) {
            const roundData = quizData[`round${roundNum}`];
            const wrapper = await showTemplate('template-round');
            
            const labelEl = wrapper.querySelector('#round-label');
            const progressEl = wrapper.querySelector('#progress-fill');
            const mediaContainer = wrapper.querySelector('#round-media');
            const questionEl = wrapper.querySelector('.round-question');
            const answersContainer = wrapper.querySelector('#answers-container');
            const nextBtn = wrapper.querySelector('.next-round-btn');
            
            labelEl.textContent = `Раунд ${roundNum} из ${TOTAL_ROUNDS}`;
            const progressPercent = ((roundNum - 1) / TOTAL_ROUNDS) * 100;
            progressEl.style.width = `${progressPercent}%`;
            
            mediaContainer.innerHTML = '';
            
            // Create Media Element
            if (roundData.type === 'video') {
                const video = document.createElement('video');
                video.src = roundData.src;
                video.muted = true; // Muted by default
                video.playsInline = true;
                video.autoplay = true;
                video.loop = true;
                video.id = 'round-video'; // ID for easy access
                mediaContainer.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = roundData.src;
                img.alt = `Раунд ${roundNum}`;
                mediaContainer.appendChild(img);
            }
            
            selectedAnswer = null;
            isConfirmed = false;
            
            await typeSingleText(questionEl, roundData.question, 35);
            
            answersContainer.innerHTML = '';
            roundData.answers.forEach((answer, index) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn stagger-item p-4 bg-white/50 border border-warm rounded-xl text-left text-text hover:bg-white/70 transition-all duration-300';
                btn.innerHTML = `
                    <span class="block font-medium text-muted">${String.fromCharCode(65 + index)}.</span>
                    <span class="block mt-1">${answer.text}</span>
                `;
                btn.dataset.correct = answer.correct;
                
                answersContainer.appendChild(btn);
                
                setTimeout(() => {
                    btn.classList.add('animate');
                }, index * 100);
                
                btn.addEventListener('click', () => handleAnswerClick(btn, answersContainer, nextBtn, roundNum));
            });
            
            nextBtn.addEventListener('click', () => {
                if (roundNum < TOTAL_ROUNDS) {
                    showRound(roundNum + 1);
                } else {
                    showResults();
                }
            }, { once: true });
        }

        function handleAnswerClick(btn, container, nextBtn, roundNum) {
            if (isConfirmed) return;
            
            // Round 3 Special Logic: Unmute video on first selection
            if (roundNum === 3) {
                const video = document.getElementById('round-video');
                if (video) video.muted = false;
            }
            
            if (selectedAnswer === btn) {
                confirmAnswer(btn, container, nextBtn);
            } else {
                container.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedAnswer = btn;
            }
        }

        async function confirmAnswer(btn, container, nextBtn) {
            isConfirmed = true;
            btn.classList.add('confirmed');
            
            const isCorrect = btn.dataset.correct === 'true';
            
            if (isCorrect) {
                score++;
                soundCorrect.currentTime = 0;
                soundCorrect.play().catch(() => {});
                triggerConfetti(); // Throw confetti
            } else {
                soundIncorrect.currentTime = 0;
                soundIncorrect.play().catch(() => {});
            }
            
            await sleep(2000);
            
            container.querySelectorAll('.answer-btn').forEach(b => {
                if (b.dataset.correct === 'true') {
                    b.classList.add('correct');
                } else if (b === btn && !isCorrect) {
                    b.classList.add('incorrect');
                }
            });
            
            nextBtn.style.opacity = '1';
            nextBtn.style.pointerEvents = 'auto';
        }

        // ==================== RESULTS ====================
        async function showResults() {
            const wrapper = await showTemplate('template-results');
            
            const resultsText = wrapper.querySelector('#results-text');
            const scoreText = wrapper.querySelector('#score-text');
            const finalMessage = wrapper.querySelector('#final-message');
            
            await typeText(resultsText, quizData.resultsSequence, 35);
            
            scoreText.textContent = `Правильных ответов: ${score} из ${TOTAL_ROUNDS}`;
            scoreText.classList.add('fade-in');
            
            await sleep(500);
            
            let message = '';
            if (score === TOTAL_ROUNDS) {
                message = 'Идеально! Ты vraiment лучшая!';
            } else if (score >= TOTAL_ROUNDS / 2) {
                message = 'Отличный результат! Ты замечательная подруга!';
            } else {
                message = 'Главное не победа, а участие! С днём рождения!';
            }
            
            finalMessage.textContent = message;
            finalMessage.style.opacity = '1';
        }

        // ==================== SURPRISE FUNCTIONALITY ====================
        async function toggleSurprise() {
            isSurpriseActive = !isSurpriseActive;
            surpriseToggle.classList.toggle('active', isSurpriseActive);
            surpriseToggle.setAttribute('aria-checked', isSurpriseActive);
            
            if (isSurpriseActive) {
                await sleep(500);
                
                bgMusic.currentTime = 0;
                bgMusic.volume = 0;
                
                try {
                    await bgMusic.play();
                    
                    const fadeDuration = 3000;
                    const steps = 60;
                    const stepDuration = fadeDuration / steps;
                    
                    for (let i = 0; i <= steps; i++) {
                        bgMusic.volume = i / steps;
                        await sleep(stepDuration);
                    }
                } catch (e) {
                    console.log('Audio playback failed:', e);
                }
                
                surpriseImage.classList.add('visible');
            } else {
                await sleep(500);
                
                const steps = 30;
                const stepDuration = 50;
                
                for (let i = steps; i >= 0; i--) {
                    bgMusic.volume = i / steps;
                    await sleep(stepDuration);
                }
                
                bgMusic.pause();
                surpriseImage.classList.remove('visible');
            }
        }

        // ==================== EVENT LISTENERS ====================
        surpriseToggle.addEventListener('click', toggleSurprise);
        surpriseToggle.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                toggleSurprise();
            }
        });

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            showWelcome(); // Preloading is called inside showWelcome
        });
    </script>
</body>
</html>
