<html lang="ru">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SN Pro', sans-serif;
            background: #FDF8F3;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Aurora Background */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            animation: aurora-drift 20s ease-in-out infinite alternate;
        }
        
        .aurora-blob:nth-child(1) {
            width: 60vw;
            height: 50vh;
            background: radial-gradient(circle, #E8D4C4 0%, transparent 70%);
            top: -15%;
            left: -5%;
            animation-duration: 18s;
        }
        
        .aurora-blob:nth-child(2) {
            width: 45vw;
            height: 55vh;
            background: radial-gradient(circle, #D4C4B0 0%, transparent 70%);
            top: 25%;
            right: -10%;
            animation-duration: 22s;
            animation-delay: -7s;
        }
        
        .aurora-blob:nth-child(3) {
            width: 50vw;
            height: 45vh;
            background: radial-gradient(circle, #C9B8A0 0%, transparent 70%);
            bottom: -5%;
            left: 25%;
            animation-duration: 25s;
            animation-delay: -4s;
        }
        
        @keyframes aurora-drift {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5vw, -3vh) scale(1.05); }
            66% { transform: translate(-3vw, 4vh) scale(0.95); }
            100% { transform: translate(2vw, 2vh) scale(1.03); }
        }
        
        /* Noise Overlay */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }
        
        /* Main Content */
        .main-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }

        /* Glass Card Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        
        /* Typing Cursor */
        .typing-cursor {
            display: inline-block;
            font-weight: 500;
            color: #C9A87C;
            animation: smoothBlink 1s ease-in-out infinite;
        }
        
        .typing-cursor::after {
            content: '_';
        }
        
        @keyframes smoothBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* Typing Container */
        .typing-container {
            text-align: left;
            min-height: 1.5em;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        /* Media Container */
        .media-container {
            position: relative;
            width: 100%;
            padding-bottom: 80%; 
            background: #eee;
            border-radius: 16px;
            overflow: hidden;
        }
        
        .media-container img,
        .media-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Answer Buttons */
        .answer-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(4px);
        }
        
        .answer-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(201, 168, 124, 0.15) 50%, transparent 60%);
            background-size: 200% 100%;
            background-position: -100% 0;
            transition: background-position 0.6s ease;
        }
        
        .answer-btn:hover::before {
            background-position: 200% 0;
        }
        
        .answer-btn.selected {
            border-color: #C9A87C;
            background: rgba(201, 168, 124, 0.15);
            transform: scale(1.02);
        }
        
        .answer-btn.confirmed {
            pointer-events: none;
        }
        
        .answer-btn.correct {
            border-color: #7CB08A;
            background: rgba(124, 176, 138, 0.2);
            animation: correct-pulse 0.5s ease;
        }
        
        .answer-btn.incorrect {
            border-color: #C98787;
            background: rgba(201, 135, 135, 0.2);
            animation: incorrect-shake 0.4s ease;
        }
        
        @keyframes correct-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        
        @keyframes incorrect-shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        
        /* Toggle Switch */
        .toggle-container {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .toggle-switch {
            width: 52px;
            height: 28px;
            background: #E8DDD0;
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s ease;
            border: 1px solid rgba(201, 168, 124, 0.3);
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: #C9A87C;
            border-radius: 50%;
            top: 2px;
            left: 3px;
            transition: transform 0.3s ease;
        }
        
        .toggle-switch.active {
            background: rgba(201, 168, 124, 0.3);
        }
        
        .toggle-switch.active::after {
            transform: translateX(23px);
        }
        
        /* Hidden Image */
        .hidden-image {
            position: fixed;
            left: 70%;
            bottom: -95%; 
            transform: translateX(-50%);
            z-index: 90;
            max-width: 600px;
            width: 90%;
            height: auto;
            object-fit: contain;
            transition: bottom 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hidden-image.visible {
            bottom: 5%; 
        }
        
        /* Progress Bar */
        .progress-bar {
            height: 4px;
            background: #E8DDD0;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #C9A87C, #D4B896);
            transition: width 0.5s ease;
        }
        
        /* Fade animations */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }
        
        .fade-out {
            animation: fadeOut 0.4s ease forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }
        
        /* Stagger animations */
        .stagger-item {
            opacity: 0;
            transform: translateY(20px);
        }
        
        .stagger-item.animate {
            animation: staggerIn 0.5s ease forwards;
        }
        
        @keyframes staggerIn {
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Confetti Container */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
            perspective: 1000px;
        }

        .confetti-piece {
            position: absolute;
            width: 12px;
            height: 12px;
            top: -20px;
            will-change: transform; 
        }
        
        .confetti-ribbon {
            position: absolute;
            width: 8px;
            height: 24px;
            top: -30px;
            border-radius: 2px;
            will-change: transform;
        }
        
        /* Input Field Styles */
        .text-input-field {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #E8DDD0;
            border-radius: 12px;
            font-family: 'SN Pro', sans-serif;
            font-size: 1rem;
            color: #4A4035;
            outline: none;
            transition: all 0.3s;
        }
        
        .text-input-field:focus {
            border-color: #C9A87C;
            background: rgba(255, 255, 255, 0.8);
        }

                /* Slider Styles (Round 7) */
        .slider-container {
            position: absolute; /* ИЗМЕНЕНИЕ: было relative. Теперь растягивается на весь media-container */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 16px;
            overflow: hidden;
        }
        
        .slide {
            width: 100%;
            height: 100%;
        }
        
        .slide .item {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.5s ease; /* Simplified transition */
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        
        .slide .item.active {
            opacity: 1;
            z-index: 2;
        }
        
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(201, 168, 124, 0.3);
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #4A4035;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }
        
        .slider-btn:hover {
            background: rgba(201, 168, 124, 0.3);
            transform: translateY(-50%) scale(1.1);
        }
        
        .slider-btn.prev { left: 10px; }
        .slider-btn.next { right: 10px; }
        
        /* Magnifying Glass Cursor */
        .magnify-cursor {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="%23C9A87C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') 16 16, zoom-in;
        }

        /* Gift Box Styles */
        .gift-box-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 40px;
        }

        .gift-box {
            width: 150px;
            height: 150px;
            background: #C9A87C;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 25px rgba(201, 168, 124, 0.3);
        }

        .gift-box:hover {
            transform: scale(1.05);
        }

        .gift-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 100%;
            background: #A08050; /* Ribbon vertical */
        }

        .gift-box::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 100%;
            height: 30px;
            background: #A08050; /* Ribbon horizontal */
        }

        .gift-bow {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 40px;
            background: #8B7E6A;
            border-radius: 50%;
            z-index: 10;
        }
        
        .gift-bow::before, .gift-bow::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            background: #8B7E6A;
            border-radius: 50%;
            top: 10px;
        }
        .gift-bow::before { left: -15px; }
        .gift-bow::after { right: -15px; }

        .gift-open-animation {
            animation: boxOpen 0.5s ease forwards;
        }

        @keyframes boxOpen {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

    </style>
</head>
<body>

        // ==================== CONFETTI LOGIC ====================
        function triggerConfetti() {
            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);
            
            const colors = ['#C9A87C', '#E8D4C4', '#D4C4B0', '#7CB08A', '#C9B8A0', '#ffffff', '#D4B896'];
            const particleCount = 100;
            const particles = [];
            
            for (let i = 0; i < particleCount; i++) {
                const typeRandom = Math.random();
                let gravity, drag, size, shape;
                
                if (typeRandom < 0.33) {
                    gravity = 0.03 + Math.random() * 0.02; 
                    drag = 0.97; 
                    size = 8;
                    shape = 'circle';
                } else if (typeRandom < 0.66) {
                    gravity = 0.06 + Math.random() * 0.03;
                    drag = 0.98;
                    size = 20; 
                    shape = 'ribbon';
                } else {
                    gravity = 0.09 + Math.random() * 0.03;
                    drag = 0.99;
                    size = 10;
                    shape = 'square';
                }
                
                const el = document.createElement('div');
                
                if (shape === 'ribbon') {
                    el.className = 'confetti-ribbon';
                    el.style.width = '6px';
                    el.style.height = size + 'px';
                } else {
                    el.className = 'confetti-piece';
                    el.style.width = size + 'px';
                    el.style.height = size + 'px';
                    if (shape === 'circle') el.style.borderRadius = '50%';
                }
                
                el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const particle = {
                    el: el,
                    x: Math.random() * window.innerWidth,
                    y: -20 - Math.random() * 100, 
                    vx: (Math.random() - 0.5) * 4, 
                    vy: Math.random() * 2, 
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10,
                    oscillationSpeed: Math.random() * 0.08 + 0.02,
                    oscillationDistance: Math.random() * 30 + 10,
                    angle: Math.random() * Math.PI * 2,
                    gravity: gravity,
                    drag: drag,
                    opacity: 1
                };
                
                particles.push(particle);
                container.appendChild(el);
            }
            
            const fadeStart = window.innerHeight * 0.2; 
            const fadeEnd = window.innerHeight * 0.5;   
            
            let animationId;
            function animate() {
                let activeParticles = 0;
                
                particles.forEach(p => {
                    if (p.opacity > 0) {
                        activeParticles++;
                        p.angle += p.oscillationSpeed;
                        p.x += Math.sin(p.angle) * 0.3; 
                        p.vy += p.gravity;
                        p.y += p.vy;
                        p.x += p.vx;
                        p.vx *= p.drag;
                        p.rotation += p.rotationSpeed;
                        
                        if (p.y > fadeStart) {
                            const progress = (p.y - fadeStart) / (fadeEnd - fadeStart);
                            p.opacity = Math.max(0, 1 - progress);
                        }
                        
                        const transform = `translate3d(${p.x}px, ${p.y}px, 0) rotateX(${p.rotation}deg) rotateY(${p.rotation}deg) rotateZ(${p.rotation / 2}deg)`;
                        p.el.style.transform = transform;
                        p.el.style.opacity = p.opacity;
                    }
                });
                
                if (activeParticles > 0) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    cancelAnimationFrame(animationId);
                    container.remove();
                }
            }
            
            animate();
        }

        // ==================== TYPING EFFECT ====================
        async function typeText(element, sequence, speed = 50) {
            element.textContent = '';
            
            for (const seq of sequence) {
                const text = seq.text;
                
                for (let i = 0; i <= text.length; i++) {
                    element.textContent = text.substring(0, i);
                    await sleep(speed);
                    
                    if (seq.type === 'final' && i === text.length) {
                        break;
                    }
                    
                    if (seq.type === 'normal' && i === text.length) {
                        await sleep(600);
                        break;
                    }
                }
                
                if (seq.type !== 'final') {
                    await sleep(800);
                    const eraseTo = 0;
                    
                    for (let i = text.length; i >= eraseTo; i--) {
                        element.textContent = text.substring(0, i);
                        await sleep(15);
                    }
                    await sleep(400);
                } else {
                    break;
                }
            }
        }
        
        async function typeSingleText(element, text, speed = 35) {
            element.textContent = '';
            for (let i = 0; i <= text.length; i++) {
                element.textContent = text.substring(0, i);
                await sleep(speed);
            }
        }

        function sleep(ms) {
            return new Promise(resolve => {
                typingTimeout = setTimeout(resolve, ms);
            });
        }

                    if (oldContent) {

                    wrapper.appendChild(content);

                    currentTemplate = wrapper;
                    wrapper.classList.add('fade-in');
                    
                    requestAnimationFrame(() => {

        }

        // Helper for multi-step rounds
        async function loadStep(stepData, questionEl, answersContainer, nextBtn, wrapper) {
            questionEl.textContent = '';
            answersContainer.innerHTML = '';
            selectedAnswer = null;
            isConfirmed = false;

            await typeSingleText(questionEl, stepData.question, 35);

            stepData.answers.forEach((answer, index) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn stagger-item p-4 bg-white/50 border border-warm rounded-xl text-left text-text hover:bg-white/70 transition-all duration-300';
                btn.innerHTML = `
                    <span class="block font-medium text-muted">${String.fromCharCode(65 + index)}.</span>
                    <span class="block mt-1">${answer.text}</span>
                `;
                btn.dataset.correct = answer.correct;
                
                answersContainer.appendChild(btn);
                
                setTimeout(() => {
                    btn.classList.add('animate');
                }, index * 100);
                
                btn.addEventListener('click', () => handleStepClick(btn, answersContainer, nextBtn, wrapper));
            });
        }

        function handleStepClick(btn, container, nextBtn, wrapper) {
            if (isConfirmed) return;
            
            if (selectedAnswer === btn) {
                confirmStepAnswer(btn, container, nextBtn, wrapper);
            } else {
                container.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedAnswer = btn;
            }
        }

        async function confirmStepAnswer(btn, container, nextBtn, wrapper) {
            isConfirmed = true;
            btn.classList.add('confirmed');
            
            const isCorrect = btn.dataset.correct === 'true';
            
            // Logic for Round 9 Step 1: Unloop video & UNMUTE

            const roundNum = parseInt(wrapper.querySelector('#round-label').textContent.split(' ')[1]);
            const roundData = quizData[`round${roundNum}`];

            if (roundNum === 9 && currentStepIndex === 0 && video) {
                video.loop = false;
                video.muted = false; // ДОБАВЛЕНО: включить звук при ответе
            }
            
            if (isCorrect) {
                score++;
                soundCorrect.currentTime = 0;
                soundCorrect.play().catch(() => {});
                triggerConfetti(); 
            } else {
                soundIncorrect.currentTime = 0;
                soundIncorrect.play().catch(() => {});
            }
            
            await sleep(1500);
            
            container.querySelectorAll('.answer-btn').forEach(b => {
                if (b.dataset.correct === 'true') {
                    b.classList.add('correct');
                } else if (b === btn && !isCorrect) {
                    b.classList.add('incorrect');
                }
            });

            // Check if there is a next step
            if (roundData.steps && currentStepIndex < roundData.steps.length - 1) {
                await sleep(1000);
                currentStepIndex++;
                const questionEl = wrapper.querySelector('.round-question');
                await loadStep(roundData.steps[currentStepIndex], questionEl, container, nextBtn, wrapper);
            } else {
                nextBtn.style.opacity = '1';
                nextBtn.style.pointerEvents = 'auto';
            }
        }

            const box = document.createElement('div');
            box.className = 'gift-box fade-in';
            
            const bow = document.createElement('div');
            bow.className = 'gift-bow';
            box.appendChild(bow);
            
            giftArea.appendChild(box);

            box.addEventListener('click', async () => {
                soundCorrect.currentTime = 0;
                soundCorrect.play().catch(() => {});
                
                box.classList.add('gift-open-animation');
                
                await sleep(500);
                
                box.remove();
                
                const img = document.createElement('img');
                img.src = roundData.giftImage;
                img.className = 'w-full max-w-md rounded-2xl shadow-lg fade-in';
                giftArea.appendChild(img);
            });
        }

        // ==================== RESULTS ====================
        async function showResults() {
            const wrapper = await showTemplate('template-results');
            
            const resultsText = wrapper.querySelector('#results-text');
            const scoreText = wrapper.querySelector('#score-text');
            const finalMessage = wrapper.querySelector('#final-message');
            
            await typeText(resultsText, quizData.resultsSequence, 35);
            
            scoreText.textContent = `Правильных ответов: ${score} из ${TOTAL_ROUNDS}`;
            scoreText.classList.add('fade-in');
            
            await sleep(500);
            
            let message = '';
            if (score === TOTAL_ROUNDS) {
                message = 'Идеально! Ты vraiment лучшая!';
            } else if (score >= TOTAL_ROUNDS / 2) {
                message = 'Отличный результат! Ты замечательная подруга!';
            } else {
                message = 'Главное не победа, а участие! С днём рождения!';
            }
            
            finalMessage.textContent = message;
            finalMessage.style.opacity = '1';
        }

        // ==================== SURPRISE FUNCTIONALITY ====================
        async function toggleSurprise() {
            isSurpriseActive = !isSurpriseActive;
            surpriseToggle.classList.toggle('active', isSurpriseActive);
            surpriseToggle.setAttribute('aria-checked', isSurpriseActive);
            
            if (isSurpriseActive) {
                await sleep(500);
                
                bgMusic.currentTime = 0;
                bgMusic.volume = 0;
                
                try {
                    await bgMusic.play();
                    
                    const fadeDuration = 3000;
                    const steps = 60;
                    const stepDuration = fadeDuration / steps;
                    
                    for (let i = 0; i <= steps; i++) {
                        bgMusic.volume = i / steps;
                        await sleep(stepDuration);
                    }
                } catch (e) {
                    console.log('Audio playback failed:', e);
                }
                
                surpriseImage.classList.add('visible');
            } else {
                await sleep(500);
                
                const steps = 30;
                const stepDuration = 50;
                
                for (let i = steps; i >= 0; i--) {
                    bgMusic.volume = i / steps;
                    await sleep(stepDuration);
                }
                
                bgMusic.pause();
                surpriseImage.classList.remove('visible');
            }
        }

        // ==================== EVENT LISTENERS ====================
        surpriseToggle.addEventListener('click', toggleSurprise);
        surpriseToggle.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                toggleSurprise();
            }
        });

        // ==================== INITIALIZATION ====================
        preloadAssets();
        
        document.addEventListener('DOMContentLoaded', () => {
            showWelcome();
        });
    </script>
</body>
</html>
